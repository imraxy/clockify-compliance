services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clockify
      POSTGRES_PASSWORD: clockify
      POSTGRES_DB: clockify
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clockify -d clockify"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://clockify:clockify@postgres:5432/clockify
      CONFIG_DIR: /app/config
      SECRET_KEY: dev-secret-change-me
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    image: node:20-alpine
    working_dir: /web
    volumes:
      - ./apps/web:/web
      - web_node_modules:/web/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  web_node_modules:
