name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Unit and integration tests
        env:
          CONFIG_DIR: ${{ github.workspace }}/config
        run: pytest -q --cov=app --cov-report=term-missing

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Start stack
        run: docker compose up -d --build postgres api
      - name: Wait for API
        run: |
          for i in $(seq 1 40); do
            curl -fsS http://127.0.0.1:8000/health && exit 0
            sleep 2
          done
          exit 1
      - name: Install Playwright (API tests)
        working-directory: e2e
        run: npm install --no-package-lock && npx playwright install chromium
      - name: Run Playwright API smoke
        working-directory: e2e
        env:
          API_URL: http://127.0.0.1:8000
        run: npx playwright test --project=api
